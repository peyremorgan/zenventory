<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zenventory</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #17130f;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      #game {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      #hud {
        position: fixed;
        top: 16px;
        left: 16px;
        color: #f4e6c8;
        background: rgba(14, 10, 8, 0.74);
        border: 1px solid rgba(255, 221, 169, 0.35);
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 20px;
        letter-spacing: 0.4px;
        z-index: 10;
      }

      #help {
        position: fixed;
        left: 16px;
        bottom: 16px;
        color: #eed7b0;
        background: rgba(14, 10, 8, 0.68);
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 14px;
        z-index: 10;
      }

      #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 8px;
        height: 8px;
        border: 1px solid rgba(255, 247, 232, 0.8);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="hud" aria-live="polite">0 / 1 sorted</div>
    <div id="help">Click to lock cursor. WASD to move. Click item to pick up. Click shelf to place.</div>
    <div id="crosshair"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
